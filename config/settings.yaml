paths:
  raw_kubernetes: data/raw/kubernetes-website
  raw_terraform: data/raw/web-unified-docs
  processed_documents: data/processed/documents.jsonl
  chunks: data/chunks/chunks.jsonl
  bm25_corpus: data/index/bm25_corpus.json
  eval_questions: evaluation/questions.jsonl
  eval_results: evaluation/results

doc_sources:
  kubernetes:
    repo_url: https://github.com/kubernetes/website.git
    content_glob: "content/en/docs/**/*.md"
    tool: kubernetes
    docs_base_url: https://kubernetes.io/docs
  terraform:
    repo_url: https://github.com/hashicorp/web-unified-docs.git
    content_glob: "content/terraform/v1.9.x/docs/**/*.mdx"
    tool: terraform
    docs_base_url: https://developer.hashicorp.com/terraform

chunking:
  target_words: 400
  max_words: 450
  overlap_words: 50
  min_section_words: 30

embeddings:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 64

reranker:
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k_fusion: 20
  top_k_final: 5

qdrant:
  host: localhost
  port: 6333
  collection_name: devops_docs

retrieval:
  semantic_top_k: 20
  keyword_top_k: 20
  rrf_k: 60

generation:
  provider: ollama          # ollama (free/local) or openai (paid API)
  model: llama3.2:3b         # run: ollama pull llama3.2:3b
  base_url: http://localhost:11434/v1
  ollama_host: http://localhost:11434
  temperature: 0.1
  max_tokens: 1024
  unknown_phrase: "I don't know based on the provided documentation."
